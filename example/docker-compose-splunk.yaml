services:
  otel-collector:
    image: quay.io/signalfx/splunk-otel-collector:latest@sha256:d0c2ed484f50f45ba243057a3ca7a59afdff1b633cd94be6474a3be3c4153660
    environment:
      - SPLUNK_ACCESS_TOKEN
      - SPLUNK_REALM=us0
      - SPLUNK_HEC_TOKEN
      - SPLUNK_HEC_URL
    ports:
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "13133:13133" # health_check extension
      - "4317:4317"   # OTLP gRPC receiver
      - "14268:14268" # Jaeger Thrift over HTTP receiver
      - "8889:8889"   # Prometheus metrics exporter (scrape endpoint)
