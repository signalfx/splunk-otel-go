services:
  otel-collector:
    image: quay.io/signalfx/splunk-otel-collector:0.156.0@sha256:67d29bb1f6b3f5efd4fad39d028cf69e5f220cc216f330f6933b8acd9c7b9050
    environment:
      - SPLUNK_ACCESS_TOKEN
      - SPLUNK_REALM=us0
      - SPLUNK_HEC_TOKEN
      - SPLUNK_HEC_URL
    ports:
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "13133:13133" # health_check extension
      - "4317:4317"   # OTLP gRPC receiver
      - "14268:14268" # Jaeger Thrift over HTTP receiver
      - "8889:8889"   # Prometheus metrics exporter (scrape endpoint)
